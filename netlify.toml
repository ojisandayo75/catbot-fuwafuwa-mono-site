[build]
publish = "."

[[redirects]]
from = "/shop"
to = "/"
status = 301

[[redirects]]
from = "/shop/"
to = "/"
status = 301

[[redirects]]
from = "/api/shop"
to = "/shop-data.json"
status = 200

[[redirects]]
from = "/api/shop/"
to = "/shop-data.json"
status = 200

[[headers]]
for = "/*"
  [headers.values]
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  X-Frame-Options = "DENY"

[[headers]]
for = "/assets/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/mp4/*"
  [headers.values]
  Cache-Control = "public, max-age=604800"

[[headers]]
for = "/go/*"
  [headers.values]
  Cache-Control = "no-store"

[[headers]]
for = "/UPLOAD_README.txt"
  [headers.values]
  Cache-Control = "no-cache"

[[headers]]
for = "/site.webmanifest"
  [headers.values]
  Cache-Control = "no-cache"

[[headers]]
for = "/favicon.ico"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.html"
  [headers.values]
  Cache-Control = "no-cache"

[[headers]]
for = "/*.json"
  [headers.values]
  Cache-Control = "no-cache"

[[headers]]
for = "/*.xml"
  [headers.values]
  Cache-Control = "no-cache"
